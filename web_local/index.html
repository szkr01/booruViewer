<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Search App</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {},
            },
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Styles */
        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: rgba(156, 163, 175, 0.5) transparent;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 20px;
            border: transparent;
        }

        /* Slider Thumb Styling */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            background: #f43f5e;
            /* rose-500 */
            cursor: pointer;
            margin-top: -6px;
        }

        input[type=range]::-moz-range-thumb {
            width: 1rem;
            height: 1rem;
            border: none;
            border-radius: 50%;
            background: #f43f5e;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 0.5rem;
            cursor: pointer;
            background: #e4e4e7;
            /* zinc-200 */
            border-radius: 0.5rem;
        }

        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #3f3f46;
            /* zinc-700 */
        }

        .predicted-tag-chip {
            padding: 0.375rem 0.75rem;
            border-radius: 9999px;
            border: 1px solid transparent;
            font-size: 0.875rem;
            font-weight: 500;
            line-height: 1.25rem;
            color: #fff;
            cursor: pointer;
            transition: filter 0.18s ease;
        }

        .predicted-tag-chip:hover {
            filter: brightness(0.98);
        }
    </style>
</head>

<body class="bg-zinc-50 dark:bg-zinc-900 transition-colors duration-300 min-h-screen">

    <!-- Header -->
    <header
        class="fixed top-0 left-0 right-0 bg-gradient-to-b from-zinc-100/70 to-white/70 dark:from-zinc-800/70 dark:to-zinc-900/70 backdrop-blur-md shadow-lg z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <h1 class="text-2xl font-semibold text-zinc-800 dark:text-zinc-100 mb-4 md:mb-0">ILEMBଳ</h1>

                <div class="flex flex-col md:flex-row items-center gap-2 w-full md:w-auto">
                    <!-- Search Input Area -->
                    <div
                        class="flex-grow w-full md:w-auto md:min-w-[300px] lg:min-w-[500px] mb-2 md:mb-0 md:mr-2 relative">
                        <input type="text" id="searchInput"
                            class="px-4 py-2.5 rounded-md border border-zinc-300 dark:border-zinc-600 dark:bg-zinc-700 dark:text-zinc-200 transition-colors focus:ring-2 focus:ring-rose-500 focus:border-rose-500 w-full box-border"
                            placeholder="タグで検索" autocomplete="off" />

                        <!-- Tag Loading Spinner -->
                        <div id="tagLoading" class="absolute right-2 top-1/2 transform -translate-y-1/2 hidden">
                            <i data-lucide="loader-2" class="animate-spin h-5 w-5 text-zinc-500 dark:text-zinc-400"></i>
                        </div>

                        <!-- Tag Suggestions -->
                        <ul id="tagSuggestions"
                            class="absolute left-0 mt-2 w-full bg-white dark:bg-zinc-700 border border-zinc-300 dark:border-zinc-600 rounded-md shadow-lg z-10 hidden max-h-60 overflow-y-auto custom-scrollbar">
                            <!-- Populated by JS -->
                        </ul>
                    </div>

                    <!-- Buttons -->
                    <div class="flex items-center gap-2">
                        <button id="toggleAdvancedSearch"
                            class="p-2 rounded-md hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors focus:outline-none">
                            <i data-lucide="sliders-horizontal" class="h-6 w-6 text-zinc-800 dark:text-zinc-100"></i>
                        </button>
                        <button id="toggleDark"
                            class="p-2 rounded-md hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors">
                            <i id="darkIcon" data-lucide="moon" class="h-6 w-6 text-zinc-800 dark:text-zinc-100"></i>
                            <i id="lightIcon" data-lucide="sun"
                                class="h-6 w-6 text-zinc-800 dark:text-zinc-100 hidden"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Advanced Search (Upload) -->
            <div id="advancedSearchArea" class="hidden mt-4 origin-top transition-all duration-300">
                <div id="dropZone"
                    class="border-2 border-dashed rounded-md p-4 transition-colors border-zinc-300 dark:border-zinc-600 hover:border-zinc-400 dark:hover:border-zinc-500">
                    <input type="file" id="fileInput" class="hidden" accept="image/*" multiple />

                    <!-- Empty State -->
                    <label for="fileInput" id="uploadEmptyState" class="cursor-pointer block w-full h-full text-center">
                        <div class="text-zinc-500 dark:text-zinc-400 transition-colors py-4">
                            <i data-lucide="image-plus" class="mx-auto h-12 w-12 md:h-16 md:w-16 mb-4"></i>
                            <p class="text-base md:text-lg font-medium mb-2">画像をアップロード</p>
                            <p class="text-xs md:text-sm opacity-75">
                                ドラッグ&ドロップ (複数可) <span class="block sm:inline"> または </span>
                                ファイルを選択 (複数可) <span class="block sm:inline"> または </span>
                                ペースト
                            </p>
                        </div>
                    </label>

                    <!-- Image Grid (Populated by JS) -->
                    <div id="uploadedImagesGrid" class="hidden w-full">
                        <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4"
                            id="uploadedImagesContainer">
                            <!-- Images go here -->
                        </div>
                        <div class="mt-4 flex gap-4">
                            <label for="fileInput"
                                class="text-sm text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 cursor-pointer">+
                                画像を追加</label>
                            <button id="clearAllUploads"
                                class="text-xs text-rose-600 dark:text-rose-400 hover:underline">すべてクリア</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="pt-16 pb-10 w-full" id="app">

        <!-- Image Gallery -->
        <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-1 w-full">
            <!-- Cards injected here -->
        </div>

        <!-- Loading Spinner -->
        <div id="mainSpinner" class="flex justify-center py-8 hidden">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-zinc-900 dark:border-white"></div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden flex justify-center py-4">
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
                <strong class="font-bold">エラー:</strong>
                <span class="block sm:inline" id="errorText"></span>
                <button id="retryButton" class="absolute top-0 bottom-0 right-0 px-4 py-3">
                    <i data-lucide="refresh-cw" class="h-4 w-4"></i>
                </button>
            </div>
        </div>

        <!-- Infinite Scroll Sentinel -->
        <div id="galleryEnd" class="h-10"></div>
    </div>

    <!-- Image Detail Modal -->
    <div id="imageDetailModal" class="fixed inset-0 z-[60] bg-black/40 backdrop-blur-md hidden" style="display: none;">
        <div class="flex h-full w-full">
            <!-- Image Area -->
            <div class="flex-1 h-full mr-96 p-4 flex items-center justify-center relative" id="modalImageArea">
                <div id="modalLoader" class="absolute inset-0 flex items-center justify-center">
                    <div
                        class="w-16 h-16 rounded-full border-4 border-t-indigo-500 border-r-indigo-500 border-b-indigo-200 border-l-indigo-200 animate-spin">
                    </div>
                </div>
                <img id="detailImage" src="" alt=""
                    class="max-w-full max-h-full object-contain shadow-2xl rounded-lg opacity-0 transition-opacity duration-500">
            </div>

            <!-- Sidebar -->
            <div class="fixed top-0 bottom-0 right-0 w-96 bg-white/80 dark:bg-zinc-900/80 shadow-xl backdrop-blur-lg overflow-y-auto custom-scrollbar"
                id="modalSidebar">
                <div class="p-8">
                    <h2 class="text-3xl font-bold mb-8 text-zinc-800 dark:text-zinc-100">Image Details</h2>
                    <dl class="space-y-8">
                        <div>
                            <dt class="text-sm font-medium text-zinc-500 dark:text-zinc-400">ID</dt>
                            <dd class="mt-1 text-lg text-zinc-900 dark:text-zinc-100" id="detailId"></dd>
                        </div>

                        <!-- Internal Tags (From API) -->
                        <div>
                            <dt class="text-sm font-medium text-zinc-500 dark:text-zinc-400">Predicted Tags</dt>
                            <dd class="mt-2" id="internalTagsContainer">
                                <!-- Populated by JS -->
                                <div id="internalTagsLoading" class="flex gap-2 text-sm text-zinc-500">
                                    <i data-lucide="loader-2" class="animate-spin w-4 h-4"></i> Analyzing...
                                </div>
                            </dd>
                        </div>

                        <!-- Danbooru Info (Legacy/External) -->
                        <div id="danbooruInfo"
                            class="space-y-8 border-t border-zinc-200 dark:border-zinc-700 pt-6 mt-6">
                            <!-- Populated by JS -->
                        </div>
                        <div id="danbooruLoading" class="mt-4 hidden">
                            <p class="text-sm text-zinc-500 dark:text-zinc-400">Loading external data...</p>
                        </div>
                    </dl>
                </div>
            </div>

            <!-- Close Button -->
            <button id="closeModalBtn"
                class="absolute top-6 left-6 text-white hover:text-zinc-200 transition-colors p-2 rounded-full bg-black/30 hover:bg-black/50">
                <i data-lucide="x" class="h-8 w-8"></i>
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast"
        class="fixed bottom-4 right-4 bg-zinc-900 text-white p-4 rounded-md shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50">
        <p id="toastMessage"></p>
        <div id="toastProgressContainer" class="mt-2 bg-zinc-700 rounded-full h-2 hidden">
            <div id="toastProgressBar" class="bg-rose-500 h-2 rounded-full" style="width: 0%"></div>
        </div>
    </div>

    <script>
        // --- State Management ---
        const state = {
            allResults: [], // 全検索結果 (Client-side paging用)
            visibleResults: [], // 現在DOMに表示されている結果
            clientPage: 1, // クライアントサイドでのページ番号
            clientPageSize: 100, // 1スクロールで追加する枚数

            loading: false, // 初回/検索ロード中

            error: null,
            needsRetry: false,

            query: '',
            uploadedImages: [],
            isDark: false,

            currentSearchQuery: null,
            currentSearchImages: [],

            tagInputTimer: null,
            activeTagPrefix: '',
            tagFetchSeq: 0,
            suggestedTags: [],
            selectedTagIndex: -1,

            danbooruCache: new Map(),
            cardImageObserver: null
        };

        const API_BASE_URL = window.location.origin;

        // --- DOM Elements ---
        const els = {
            html: document.documentElement,
            app: document.getElementById('app'),
            searchInput: document.getElementById('searchInput'),
            tagLoading: document.getElementById('tagLoading'),
            tagSuggestions: document.getElementById('tagSuggestions'),
            galleryGrid: document.getElementById('galleryGrid'),
            mainSpinner: document.getElementById('mainSpinner'),
            errorMessage: document.getElementById('errorMessage'),
            errorText: document.getElementById('errorText'),
            galleryEnd: document.getElementById('galleryEnd'),
            advancedSearchBtn: document.getElementById('toggleAdvancedSearch'),
            advancedSearchArea: document.getElementById('advancedSearchArea'),
            dropZone: document.getElementById('dropZone'),
            fileInput: document.getElementById('fileInput'),
            uploadEmptyState: document.getElementById('uploadEmptyState'),
            uploadedImagesGrid: document.getElementById('uploadedImagesGrid'),
            uploadedImagesContainer: document.getElementById('uploadedImagesContainer'),
            clearAllUploads: document.getElementById('clearAllUploads'),
            retryButton: document.getElementById('retryButton'),
            toggleDarkBtn: document.getElementById('toggleDark'),
            darkIcon: document.getElementById('darkIcon'),
            lightIcon: document.getElementById('lightIcon'),

            // Modal
            modal: document.getElementById('imageDetailModal'),
            modalImageArea: document.getElementById('modalImageArea'),
            detailImage: document.getElementById('detailImage'),
            modalLoader: document.getElementById('modalLoader'),
            detailId: document.getElementById('detailId'),
            internalTagsContainer: document.getElementById('internalTagsContainer'),
            internalTagsLoading: document.getElementById('internalTagsLoading'),

            danbooruInfo: document.getElementById('danbooruInfo'),
            danbooruLoading: document.getElementById('danbooruLoading'),
            closeModalBtn: document.getElementById('closeModalBtn'),

            // Toast
            toast: document.getElementById('toast'),
            toastMessage: document.getElementById('toastMessage'),
            toastProgressContainer: document.getElementById('toastProgressContainer'),
            toastProgressBar: document.getElementById('toastProgressBar')
        };

        // --- Helpers ---
        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i++) {
                if (a[i].file.name !== b[i].file.name || a[i].weight !== b[i].weight) return false;
            }
            return true;
        }

        const RatingMap = { 0: 'General', 1: 'Questionable', 2: 'Sensitive', 3: 'Explicit', default: 'Unknown' };
        const RatingColorMap = { 0: 'text-blue-400', 1: 'text-yellow-400', 2: 'text-pink-400', 3: 'text-red-400', default: 'text-gray-500' };

        // --- Logic: Search (Updated for New API) ---
        async function fetchSearchResults(queryText, images, limit = '5000') {
            const url = new URL(`${API_BASE_URL}/API/search`);
            const formData = new FormData();
            if (queryText) {
                formData.append('q', queryText);
            }
            if (images && images.length > 0) {
                images.forEach(img => {
                    formData.append('image', img.file);
                    formData.append('image_weight', String(img.weight));
                });
            }
            formData.append('limit', String(limit));

            const response = await fetch(url.toString(), {
                method: 'POST',
                headers: { 'accept': 'application/json' },
                body: formData
            });
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        }

        async function performSearch(query, images) {
            const inputQuery = query?.trim() || null;
            const inputImages = images || [];

            console.log('performSearch', inputQuery, inputImages);

            const queryChanged = inputQuery !== state.currentSearchQuery;
            const imagesChanged = !arraysEqual(inputImages, state.currentSearchImages);

            // 変更がない、かつ既に結果がある場合はスキップ
            if (!queryChanged && !imagesChanged && state.allResults.length > 0) return;

            // リセット
            state.allResults = [];
            state.visibleResults = [];
            state.clientPage = 1;
            state.error = null;
            state.needsRetry = false;
            state.loading = true;

            state.currentSearchQuery = inputQuery;
            state.currentSearchImages = [...inputImages.map(img => ({ ...img }))];

            updateUI(); // ローディング表示

            // 【修正】クエリなし・画像なしでもAPIを叩いて全件/デフォルト結果を取得するように変更
            /*
            if (!state.currentSearchQuery && state.currentSearchImages.length === 0) {
                state.loading = false;
                updateUI();
                return;
            }
            */

            try {
                // First try: requested query/images
                let data = await fetchSearchResults(state.currentSearchQuery, state.currentSearchImages, '5000');
                // Fallback: never keep empty result on first page
                if (!Array.isArray(data) || data.length === 0) {
                    data = await fetchSearchResults(null, [], '5000');
                }
                state.allResults = Array.isArray(data) ? data : [];

                // 初回表示分を追加
                renderNextPage();

            } catch (e) {
                console.error(e);
                state.error = '検索中にエラーが発生しました。';
                state.needsRetry = true;
            } finally {
                state.loading = false;
                updateUI();
            }
        }

        // クライアントサイドページング: 保持している allResults から次のチャンクを表示
        function renderNextPage() {
            const startIndex = (state.clientPage - 1) * state.clientPageSize;
            const endIndex = startIndex + state.clientPageSize;

            const newSlice = state.allResults.slice(startIndex, endIndex);

            if (newSlice.length > 0) {
                state.visibleResults.push(...newSlice);
                state.clientPage++;

                // 新しい分だけDOMに追加
                newSlice.forEach(img => createImageCard(img));
                lucide.createIcons();
            }
        }

        // Infinite Scrollのトリガー (APIではなくローカル配列を参照)
        function handleInfiniteScroll() {
            const maxPages = Math.ceil(state.allResults.length / state.clientPageSize);
            if (state.clientPage <= maxPages) {
                renderNextPage();
            }
        }

        // --- Logic: Image Upload ---
        function addUploadedImages(files) {
            if (!files) return;
            const newFiles = Array.from(files);

            newFiles.forEach(file => {
                if (!state.uploadedImages.some(existing => existing.file.name === file.name && existing.file.size === file.size)) {
                    if (file.type.startsWith('image/')) {
                        state.uploadedImages.push({
                            file: file,
                            weight: 1.0,
                            url: URL.createObjectURL(file)
                        });
                    }
                }
            });
            renderUploadedImages();
            triggerSearch();
        }

        function getDroppedUrl(e) {
            const uriList = e.dataTransfer?.getData('text/uri-list')?.trim();
            if (uriList) {
                const firstUrl = uriList
                    .split('\n')
                    .map(line => line.trim())
                    .find(line => line && !line.startsWith('#'));
                if (firstUrl) return firstUrl;
            }

            const plainText = e.dataTransfer?.getData('text/plain')?.trim();
            if (plainText) return plainText;

            return '';
        }

        async function addUploadedImageFromUrl(url) {
            if (!url) return false;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const blob = await response.blob();
                if (!blob.type.startsWith('image/')) return false;

                let filename = 'dropped_image';
                try {
                    const pathname = new URL(url, window.location.href).pathname;
                    const lastSegment = pathname.split('/').filter(Boolean).pop();
                    if (lastSegment) {
                        filename = decodeURIComponent(lastSegment).replace(/\.[^.]+$/, '');
                    }
                } catch (_) {
                    // Keep fallback filename.
                }

                const ext = (blob.type.split('/')[1] || 'png').toLowerCase();
                const file = new File([blob], `${filename}.${ext}`, { type: blob.type });
                addUploadedImages([file]);
                return true;
            } catch (error) {
                console.error('Dropped URL image fetch failed', error);
                return false;
            }
        }

        function removeUploadedImage(index) {
            URL.revokeObjectURL(state.uploadedImages[index].url);
            state.uploadedImages.splice(index, 1);
            renderUploadedImages();
            triggerSearch();
        }

        function clearAllUploadedImages() {
            state.uploadedImages.forEach(img => URL.revokeObjectURL(img.url));
            state.uploadedImages = [];
            renderUploadedImages();
            triggerSearch();
        }

        function updateImageWeight(index, newWeight) {
            state.uploadedImages[index].weight = parseFloat(newWeight);
            triggerSearch();
        }

        function renderUploadedImages() {
            const hasImages = state.uploadedImages.length > 0;
            els.uploadEmptyState.classList.toggle('hidden', hasImages);
            els.uploadedImagesGrid.classList.toggle('hidden', !hasImages);

            if (hasImages) {
                els.dropZone.classList.remove('border-zinc-300', 'dark:border-zinc-600');
                els.dropZone.classList.add('border-rose-500', 'bg-rose-50/10', 'dark:bg-rose-900/10');
                els.advancedSearchBtn.classList.add('bg-zinc-200', 'dark:bg-zinc-700', 'ring-2', 'ring-rose-500');
            } else {
                els.dropZone.classList.add('border-zinc-300', 'dark:border-zinc-600');
                els.dropZone.classList.remove('border-rose-500', 'bg-rose-50/10', 'dark:bg-rose-900/10');
                els.advancedSearchBtn.classList.remove('bg-zinc-200', 'dark:bg-zinc-700', 'ring-2', 'ring-rose-500');
            }

            els.uploadedImagesContainer.innerHTML = '';

            state.uploadedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'relative group flex flex-col';
                div.innerHTML = `
                    <div class="aspect-square bg-zinc-100 dark:bg-zinc-800 rounded-md overflow-hidden mb-2 relative">
                        <img src="${img.url}" alt="Uploaded" class="w-full h-full object-cover transition-all duration-300 group-hover:opacity-75" />
                        <button class="remove-btn absolute top-1 right-1 bg-rose-500/80 text-white rounded-full p-1 hover:bg-rose-600/90 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity">
                            <i data-lucide="x" class="h-3 w-3"></i>
                        </button>
                        <div class="absolute bottom-0 left-0 right-0 bg-black/50 text-white text-xs p-1 truncate opacity-0 group-hover:opacity-100 transition-opacity">
                            ${img.file.name}
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <input type="range" min="-2" max="2" step="0.1" value="${img.weight}" class="w-full h-2 bg-zinc-200 dark:bg-zinc-700 rounded-lg appearance-none cursor-pointer accent-rose-500 weight-slider" />
                        <span class="text-xs w-6 text-right tabular-nums text-zinc-600 dark:text-zinc-400">${img.weight.toFixed(1)}</span>
                    </div>
                `;

                div.querySelector('.remove-btn').addEventListener('click', (e) => {
                    e.preventDefault();
                    removeUploadedImage(index);
                });

                div.querySelector('.weight-slider').addEventListener('input', (e) => {
                    const val = e.target.value;
                    div.querySelector('span').textContent = parseFloat(val).toFixed(1);
                });
                div.querySelector('.weight-slider').addEventListener('change', (e) => {
                    updateImageWeight(index, e.target.value);
                });

                els.uploadedImagesContainer.appendChild(div);
            });
            lucide.createIcons();
        }

        // --- Logic: Tag Autocomplete ---
        const categoryTextColors = {
            0: 'text-blue-600 dark:text-blue-200',
            4: 'text-green-600 dark:text-green-200',
            9: 'text-pink-600 dark:text-pink-200',
            default: 'text-gray-600 dark:text-gray-200'
        };

        async function fetchTags(prefix) {
            const fetchSeq = ++state.tagFetchSeq;
            els.tagLoading.classList.remove('hidden');
            try {
                const url = new URL(`${API_BASE_URL}/API/tags`);
                url.searchParams.append('prefix', prefix);

                const response = await fetch(url.toString());
                if (!response.ok) throw new Error('Tag fetch failed');

                const data = await response.json();
                if (fetchSeq !== state.tagFetchSeq || prefix !== state.activeTagPrefix) return;
                const mapped = Array.isArray(data)
                    ? data.map(t => ({ name: t[0], category: t[1], count: t[2] }))
                    : [];
                state.suggestedTags = mapped.length > 0
                    ? mapped
                    : (prefix ? [{ name: prefix, category: 0, count: 0 }] : []);
            } catch (e) {
                console.error("Tags error", e);
                if (fetchSeq === state.tagFetchSeq) {
                    state.suggestedTags = [];
                }
            } finally {
                if (fetchSeq === state.tagFetchSeq) {
                    els.tagLoading.classList.add('hidden');
                    renderSuggestions();
                }
            }
        }

        function clearSuggestions() {
            state.suggestedTags = [];
            state.selectedTagIndex = -1;
            els.tagLoading.classList.add('hidden');
            renderSuggestions();
        }

        function handleTagInput(val) {
            state.query = val;
            state.selectedTagIndex = -1;

            if (state.tagInputTimer) clearTimeout(state.tagInputTimer);

            if (val.endsWith(' ')) {
                state.activeTagPrefix = '';
                state.tagFetchSeq += 1;
                clearSuggestions();
                return;
            }

            const trimmed = val.trim();
            if (!trimmed) {
                state.activeTagPrefix = '';
                state.tagFetchSeq += 1;
                clearSuggestions();
                return;
            }

            const tags = trimmed.split(/\s+/);
            const lastTag = tags[tags.length - 1];
            state.activeTagPrefix = lastTag || '';

            if (lastTag && lastTag.length > 0) {
                state.tagInputTimer = setTimeout(() => {
                    fetchTags(lastTag);
                }, 250);
            } else {
                state.tagFetchSeq += 1;
                clearSuggestions();
            }
        }

        function selectTag(tag) {
            let currentVal = els.searchInput.value;
            const parts = currentVal.trim().split(/\s+/);
            // 最後の未完成タグを削除
            if (parts.length > 0 && parts[parts.length - 1] !== '') {
                parts.pop();
            }
            parts.push(tag.name);

            const newQuery = parts.join(' ') + ' ';

            state.query = newQuery;
            els.searchInput.value = newQuery;

            state.activeTagPrefix = '';
            state.tagFetchSeq += 1;
            clearSuggestions();

            // タグ選択後も入力を継続できるように、検索はすぐに実行しない
            // Enterキーまたは明示的な検索ボタンで実行
            els.searchInput.focus();
        }

        function renderSuggestions() {
            els.tagSuggestions.innerHTML = '';
            if (state.suggestedTags.length > 0) {
                els.tagSuggestions.classList.remove('hidden');

                state.suggestedTags.forEach((tag, index) => {
                    const li = document.createElement('li');
                    li.className = `px-4 py-2 cursor-pointer transition-colors ${state.selectedTagIndex === index ? 'bg-zinc-200 dark:bg-zinc-500' : 'hover:bg-zinc-100 dark:hover:bg-zinc-600'}`;

                    const countStr = tag.count >= 1000 ? (tag.count / 1000).toFixed(0) + 'k' : tag.count;
                    const colorClass = categoryTextColors[tag.category] || categoryTextColors.default;

                    li.innerHTML = `
                        <div class="flex justify-between">
                            <span class="${colorClass}">${tag.name}</span>
                            <span class="text-xs text-zinc-500 dark:text-zinc-400">(${countStr})</span>
                        </div>
                    `;

                    li.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        selectTag(tag);
                    });

                    li.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                    });

                    li.addEventListener('mouseenter', () => {
                        state.selectedTagIndex = index;
                        updateSuggestionSelection();
                    });

                    els.tagSuggestions.appendChild(li);
                });
            } else {
                els.tagSuggestions.classList.add('hidden');
            }
        }

        function updateSuggestionSelection() {
            const items = els.tagSuggestions.querySelectorAll('li');
            items.forEach((item, index) => {
                item.classList.toggle('bg-zinc-200', state.selectedTagIndex === index);
                item.classList.toggle('dark:bg-zinc-500', state.selectedTagIndex === index);
                item.classList.toggle('hover:bg-zinc-100', state.selectedTagIndex !== index);
                item.classList.toggle('dark:hover:bg-zinc-600', state.selectedTagIndex !== index);
            });
        }

        function handleKeyNavigation(e) {
            if (state.suggestedTags.length === 0) return;

            if (e.key === 'ArrowUp') {
                e.preventDefault();
                state.selectedTagIndex = Math.max(0, state.selectedTagIndex - 1);
                renderSuggestions();
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                state.selectedTagIndex = Math.min(state.suggestedTags.length - 1, state.selectedTagIndex + 1);
                renderSuggestions();
            } else if (e.key === 'Enter') {
                if (state.selectedTagIndex !== -1) {
                    e.preventDefault();
                    selectTag(state.suggestedTags[state.selectedTagIndex]);
                }
            } else if (e.key === 'Tab') {
                if (state.suggestedTags.length > 0) {
                    e.preventDefault();
                    // Shift+Tab で上に移動、Tab で下に移動
                    if (e.shiftKey) {
                        state.selectedTagIndex = state.selectedTagIndex <= 0 
                            ? state.suggestedTags.length - 1 
                            : state.selectedTagIndex - 1;
                    } else {
                        state.selectedTagIndex = state.selectedTagIndex < state.suggestedTags.length - 1 
                            ? state.selectedTagIndex + 1 
                            : 0;
                    }
                    renderSuggestions();
                }
            }
        }

        // --- Logic: Local Tag Fetching (New Feature) ---
        async function fetchLocalTags(entryId) {
            els.internalTagsLoading.classList.remove('hidden');
            els.internalTagsContainer.innerHTML = '';
            els.internalTagsContainer.appendChild(els.internalTagsLoading);

            try {
                const res = await fetch(`${API_BASE_URL}/API/tags_from_id/${entryId}`);
                if (!res.ok) throw new Error("Failed to fetch tags");
                const tags = await res.json(); // List of {tag_name, probability}

                els.internalTagsContainer.innerHTML = '';
                if (tags.length === 0) {
                    els.internalTagsContainer.textContent = "No tags detected.";
                    return;
                }

                const flexDiv = document.createElement('div');
                flexDiv.className = 'flex flex-wrap gap-2';

                tags.forEach(t => {
                    const span = document.createElement('span');

                    const probability = Math.max(0, Math.min(1, Number(t.probability) || 0));
                    const hue = 8 + probability * 122;
                    const backgroundColor = `hsla(${hue}, 50%, 38%, 0.42)`;
                    const borderColor = `hsla(${hue}, 40%, 58%, 0.42)`;

                    span.style.borderColor = borderColor;
                    span.style.backgroundColor = backgroundColor;

                    const percent = (probability * 100).toFixed(0);
                    span.className = 'predicted-tag-chip';

                    span.title = `Probability: ${t.probability.toFixed(4)}`;
                    span.textContent = `${t.tag_name} (${percent}%)`;

                    // クリックで検索に追加
                    span.addEventListener('click', () => {
                        closeModal();
                        selectTag({ name: t.tag_name });
                    });

                    flexDiv.appendChild(span);
                });
                els.internalTagsContainer.appendChild(flexDiv);

            } catch (e) {
                console.error(e);
                els.internalTagsContainer.textContent = "Failed to load tags.";
            }
        }
        // --- Logic: Danbooru Details (Existing/Legacy) ---
        async function fetchDanbooruData(url) {
            // Logic unchanged from previous version, just rendered in separate section
            if (!url || !url.startsWith('https://danbooru.donmai.us/posts/')) return null;
            if (state.danbooruCache.has(url)) return state.danbooruCache.get(url);

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const artistEl = doc.querySelector('.tag-type-1 a.search-tag');
                const imgMeta = doc.querySelector('meta[property="og:image"]');
                const sourceEl = doc.querySelector('#post-info-source a');

                const data = {
                    artist: artistEl ? artistEl.textContent : null,
                    characters: Array.from(doc.querySelectorAll('.tag-type-4 a.search-tag')).map(el => el.textContent),
                    copyrights: Array.from(doc.querySelectorAll('.tag-type-3 a.search-tag')).map(el => el.textContent),
                    tags: Array.from(doc.querySelectorAll('.tag-type-0 a.search-tag')).map(el => el.textContent),
                    image_url: imgMeta ? imgMeta.content : null,
                    source: sourceEl ? sourceEl.href : null
                };

                state.danbooruCache.set(url, data);
                return data;
            } catch (e) {
                console.error('Danbooru fetch error', e);
                return null;
            }
        }

        function isDirectMediaUrl(url) {
            return typeof url === 'string'
                && /^https?:\/\//.test(url)
                && !url.includes('/API/media/');
        }

        function getDirectMediaUrl(image) {
            return isDirectMediaUrl(image?.media_url) ? image.media_url : null;
        }

        function getThumbnailUrl(image) {
            return getDirectMediaUrl(image);
        }

        async function resolveDisplayImageUrl(image, preferOriginal = false, danbooruData = null) {
            const directMediaUrl = getDirectMediaUrl(image);

            if (!preferOriginal && directMediaUrl) {
                return directMediaUrl;
            }

            const data = danbooruData || (
                image?.url && image.url.includes('danbooru.donmai.us/posts/')
                    ? await fetchDanbooruData(image.url)
                    : null
            );
            if (data?.image_url) {
                return data.image_url;
            }

            return directMediaUrl;
        }

        function ensureCardImageObserver() {
            if (state.cardImageObserver) return state.cardImageObserver;

            state.cardImageObserver = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (!entry.isIntersecting) return;

                    const img = entry.target;
                    const nextSrc = img.dataset.src;
                    if (!nextSrc) {
                        state.cardImageObserver.unobserve(img);
                        return;
                    }

                    img.src = nextSrc;
                    delete img.dataset.src;
                    state.cardImageObserver.unobserve(img);
                });
            }, { rootMargin: '300px 0px', threshold: 0.01 });

            return state.cardImageObserver;
        }

        function appendDanbooruField(container, label, value) {
            if (!value || (Array.isArray(value) && value.length === 0)) return;

            const row = document.createElement('div');
            row.className = 'space-y-1';

            const labelEl = document.createElement('p');
            labelEl.className = 'text-2xs font-bold uppercase tracking-wide text-zinc-500 dark:text-zinc-400';
            labelEl.textContent = label;

            const valueEl = document.createElement('p');
            valueEl.className = 'text-2sm font-bold text-zinc-800 dark:text-zinc-200 break-words';
            valueEl.textContent = Array.isArray(value) ? value.join(', ') : value;

            row.appendChild(labelEl);
            row.appendChild(valueEl);
            container.appendChild(row);
        }

        function renderDanbooruInfo(postUrl, data) {
            els.danbooruInfo.innerHTML = '';

            const section = document.createElement('div');
            section.className = 'space-y-4';

            const title = document.createElement('h2');
            title.className = 'text-2xl font-bold text-zinc-700 dark:text-zinc-300';
            title.textContent = 'External Source (Danbooru)';
            section.appendChild(title);

            appendDanbooruField(section, 'Artist', data?.artist);
            appendDanbooruField(section, 'Characters', data?.characters);
            appendDanbooruField(section, 'Copyrights', data?.copyrights);

            const link = document.createElement('a');
            link.href = postUrl;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.className = ' font-bold inline-flex items-center text-sm font-medium text-indigo-600 hover:text-indigo-500 hover:underline break-all';
            link.textContent = 'Open in Danbooru';
            section.appendChild(link);

            if (data?.source) {
                const sourceLink = document.createElement('a');
                sourceLink.href = data.source;
                sourceLink.target = '_blank';
                sourceLink.rel = 'noopener noreferrer';
                sourceLink.className = 'block text-xs text-zinc-500 hover:text-zinc-700 dark:text-zinc-400 dark:hover:text-zinc-200 break-all';
                sourceLink.textContent = data.source;
                section.appendChild(sourceLink);
            }

            els.danbooruInfo.appendChild(section);
        }

        async function openImageDetail(image) {
            els.modal.classList.remove('hidden');
            els.modal.style.display = 'block';
            document.body.style.overflow = 'hidden';

            els.detailImage.classList.remove('opacity-100', 'scale-100');
            els.detailImage.classList.add('opacity-0', 'scale-95');
            els.modalLoader.classList.remove('hidden');

            els.detailId.textContent = image.id;

            // Rating may not be present in new API response (ImageEntry). Check properties.
            // If missing, handle gracefully. Assuming `rating` exists or undefined.
            const ratingText = image.rating !== undefined ? (RatingMap[image.rating] || RatingMap.default) : 'Unknown';
            els.detailRating = document.createElement('dd'); // Recreate or just text? code above uses specific ID for dd.
            // Warning: logic for rating element was simplified in previous step.
            // Let's assume image object structure. If new API `ImageEntry` doesn't have rating, hide it?
            // For now, assume it might exist.

            // 1. Fetch Local Tags
            fetchLocalTags(image.id);

            // 2. Clear Danbooru info
            els.danbooruInfo.innerHTML = '';
            els.danbooruLoading.classList.add('hidden');

            // 3. Try fetch Danbooru info if URL exists (assuming 'path' or 'url' might contain it? 
            // The API returns ImageEntry. If it has a source URL field, we use it.)
            // Assuming `image.url` exists and points to source or we don't have it.
            // If the API just returns `id` and `path`, we can't link to Danbooru easily unless we have metadata.
            // I will keep the logic but check if property exists.
            let danbooruData = null;
            if (image.url && image.url.includes('danbooru')) {
                els.danbooruLoading.classList.remove('hidden');
                danbooruData = await fetchDanbooruData(image.url);
                els.danbooruLoading.classList.add('hidden');
                renderDanbooruInfo(image.url, danbooruData);
            }

            const detailUrl = await resolveDisplayImageUrl(image, true, danbooruData);
            if (!detailUrl) {
                els.modalLoader.classList.add('hidden');
                els.detailImage.removeAttribute('src');
                return;
            }

            els.detailImage.src = detailUrl;
            els.detailImage.onload = () => {
                els.modalLoader.classList.add('hidden');
                els.detailImage.classList.remove('opacity-0', 'scale-95');
                els.detailImage.classList.add('opacity-100', 'scale-100');
            };
        }

        function closeModal() {
            els.modal.classList.add('hidden');
            els.modal.style.display = 'none';
            document.body.style.overflow = '';
        }

        // --- Logic: Image Download ---
        async function downloadImage(image) {
            showToast('Download starting...');
            const downloadUrl = await resolveDisplayImageUrl(image, true);
            if (!downloadUrl) {
                showToast('Download Error');
                setTimeout(() => {
                    els.toast.classList.remove('opacity-100');
                }, 2000);
                return;
            }
            const filename = `image_${image.id}.jpg`; // Extension assumption

            try {
                const response = await fetch(downloadUrl);
                if (!response.ok) throw new Error('Download failed');

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showToast('Download complete!');
                setTimeout(() => {
                    els.toast.classList.remove('opacity-100');
                }, 1500);

            } catch (e) {
                showToast('Download Error');
                setTimeout(() => {
                    els.toast.classList.remove('opacity-100');
                }, 2000);
            }
        }

        function showToast(msg) {
            els.toastMessage.textContent = msg;
            els.toast.classList.remove('opacity-0');
            els.toast.classList.add('opacity-100');
        }

        // --- UI Rendering ---
        function commitSearch() {
            clearSuggestions();
            triggerSearch();
        }

        function triggerSearch() {
            performSearch(state.query, state.uploadedImages);
        }

        function updateUI() {
            if (state.loading) {
                els.mainSpinner.classList.remove('hidden');
                els.errorMessage.classList.add('hidden');
            } else {
                els.mainSpinner.classList.add('hidden');
            }

            if (state.error) {
                els.errorMessage.classList.remove('hidden');
                els.errorText.textContent = state.error;
            } else {
                els.errorMessage.classList.add('hidden');
            }

            // 初回描画時クリア
            if (state.clientPage === 1 && state.visibleResults.length === 0) {
                els.galleryGrid.innerHTML = '';
            }
        }

        function createImageCard(image) {
            const div = document.createElement('div');
            div.className = 'relative overflow-hidden transition-all duration-300 bg-transparent aspect-square group';

            div.innerHTML = `
                <div class="loading-overlay absolute inset-0 flex items-center justify-center bg-white bg-opacity-80 dark:bg-zinc-800 dark:bg-opacity-80 z-10">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-zinc-900 dark:border-white"></div>
                </div>
                <img alt="${image.id}" loading="lazy"
                    class="w-full h-full object-cover transition-all duration-500 opacity-0 scale-110 cursor-grab active:cursor-grabbing" 
                    draggable="true" />
            `;

            const img = div.querySelector('img');
            const loader = div.querySelector('.loading-overlay');
            const thumbUrl = getThumbnailUrl(image);
            if (thumbUrl) {
                img.dataset.src = thumbUrl;
                ensureCardImageObserver().observe(img);
            } else {
                loader.innerHTML = '<i data-lucide="alert-circle" class="w-8 h-8 text-red-500"></i>';
                lucide.createIcons();
            }

            img.onload = () => {
                loader.classList.add('hidden');
                img.classList.remove('opacity-0', 'scale-110');
                img.classList.add('opacity-100', 'scale-100');
            };
            img.onerror = () => {
                // Retry with full size or show error? For now simple error handling
                loader.innerHTML = '<i data-lucide="alert-circle" class="w-8 h-8 text-red-500"></i>';
            };

            div.addEventListener('click', (e) => {
                if (e.ctrlKey) {
                    e.preventDefault();
                    downloadImage(image);
                } else {
                    openImageDetail(image);
                }
            });

            img.addEventListener('dragstart', (e) => {
                const dragUrl = `${API_BASE_URL}/API/media/${image.id}`;
                e.dataTransfer.setData('text/plain', dragUrl);
                e.dataTransfer.setData('text/uri-list', dragUrl);
                e.dataTransfer.effectAllowed = 'copy';
            });

            els.galleryGrid.appendChild(div);
        }

        // --- Initialization & Event Listeners ---
        function init() {
            const savedDark = localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            setDarkMode(savedDark);

            triggerSearch();

            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    handleInfiniteScroll();
                }
            }, { threshold: 0.5 });
            observer.observe(els.galleryEnd);
        }

        function setDarkMode(isDark) {
            state.isDark = isDark;
            if (isDark) {
                els.html.classList.add('dark');
                els.darkIcon.classList.add('hidden');
                els.lightIcon.classList.remove('hidden');
                localStorage.setItem('theme', 'dark');
            } else {
                els.html.classList.remove('dark');
                els.darkIcon.classList.remove('hidden');
                els.lightIcon.classList.add('hidden');
                localStorage.setItem('theme', 'light');
            }
        }

        // --- Logic: Tag Weight Adjustment ---
        function adjustTagWeight(direction) {
            const input = els.searchInput;
            const cursorPos = input.selectionStart;
            const text = input.value;
            
            // カーソル位置の前後でスペースを探してタグを特定
            let startPos = text.lastIndexOf(' ', cursorPos - 1) + 1;
            let endPos = text.indexOf(' ', cursorPos);
            if (endPos === -1) endPos = text.length;
            
            // 現在のタグを取得
            const currentTag = text.substring(startPos, endPos);
            if (!currentTag) return;
            
            // 重み構文をパース: (tag:weight) または ((tag:weight):weight) などのネスト対応
            // 最後の ':' を探して重みを特定（タグ名に'-'が含まれる場合を考慮）
            let tagName, currentWeight;
            
            if (currentTag.startsWith('(') && currentTag.endsWith(')')) {
                // 括弧で囲まれている場合、最後の ':' を探す
                const innerContent = currentTag.slice(1, -1);
                const lastColonIndex = innerContent.lastIndexOf(':');
                
                if (lastColonIndex !== -1) {
                    // ':' が見つかった場合、それ以降を重みとして扱う
                    const weightStr = innerContent.substring(lastColonIndex + 1);
                    const parsedWeight = parseFloat(weightStr);
                    
                    if (!isNaN(parsedWeight)) {
                        // 既に重みがある場合
                        tagName = innerContent.substring(0, lastColonIndex);
                        currentWeight = parsedWeight;
                    } else {
                        // 重みが数値でない場合は1.0とみなす
                        tagName = currentTag;
                        currentWeight = 1.0;
                    }
                } else {
                    // ':' がない場合は1.0とみなす
                    tagName = innerContent;
                    currentWeight = 1.0;
                }
            } else {
                // 括弧がない場合は1.0とみなす
                tagName = currentTag;
                currentWeight = 1.0;
            }
            
            // 重みを調整 (0.5刻み)
            const newWeight = direction === 'up' 
                ? currentWeight + 0.5 
                : currentWeight - 0.5;
            
            // 新しいタグ文字列を作成（負の数も対応）
            const newTag = `(${tagName}:${newWeight.toFixed(1)})`;
            
            // テキストを更新
            const newText = text.substring(0, startPos) + newTag + text.substring(endPos);
            input.value = newText;
            
            // カーソル位置を調整（新しいタグの末尾）
            const newCursorPos = startPos + newTag.length;
            input.setSelectionRange(newCursorPos, newCursorPos);
            
            // 入力イベントを発火させて検索をトリガー
            state.query = newText;
            handleTagInput(newText);
        }

        // Event Wiring
        els.searchInput.addEventListener('input', (e) => handleTagInput(e.target.value));
        els.searchInput.addEventListener('focus', () => handleTagInput(els.searchInput.value));

        els.searchInput.addEventListener('keydown', (e) => {
            // Ctrl+上下で重み調整
            if (e.ctrlKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
                e.preventDefault();
                adjustTagWeight(e.key === 'ArrowUp' ? 'up' : 'down');
                return;
            }
            
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'Tab') {
                handleKeyNavigation(e);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (state.selectedTagIndex !== -1) {
                    selectTag(state.suggestedTags[state.selectedTagIndex]);
                    return;
                }
                commitSearch();
            }
        });

        document.addEventListener('mousedown', (e) => {
            if (els.searchInput.contains(e.target) || els.tagSuggestions.contains(e.target)) return;
            clearSuggestions();
        });

        els.advancedSearchBtn.addEventListener('click', () => {
            els.advancedSearchArea.classList.toggle('hidden');
            const isOpen = !els.advancedSearchArea.classList.contains('hidden');
            els.advancedSearchBtn.classList.toggle('bg-zinc-200', isOpen);
            els.advancedSearchBtn.classList.toggle('dark:bg-zinc-700', isOpen);
        });

        els.toggleDarkBtn.addEventListener('click', () => setDarkMode(!state.isDark));

        els.fileInput.addEventListener('change', (e) => {
            addUploadedImages(e.target.files);
            e.target.value = '';
        });

        ['dragover', 'dragleave'].forEach(evt => {
            els.dropZone.addEventListener(evt, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });

        els.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (e.dataTransfer.files.length) {
                addUploadedImages(e.dataTransfer.files);
                return;
            }

            const droppedUrl = getDroppedUrl(e);
            if (droppedUrl) {
                void addUploadedImageFromUrl(droppedUrl);
            }
        });

        els.clearAllUploads.addEventListener('click', clearAllUploadedImages);

        document.addEventListener('paste', (e) => {
            const items = e.clipboardData?.items;
            if (items) {
                const files = [];
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        const f = items[i].getAsFile();
                        if (f) files.push(f);
                    }
                }
                if (files.length) addUploadedImages(files);
            }
        });

        els.retryButton.addEventListener('click', () => {
            state.needsRetry = false;
            triggerSearch();
        });

        els.modal.addEventListener('click', closeModal);
        els.closeModalBtn.addEventListener('click', closeModal);
        els.modalImageArea.addEventListener('click', (e) => e.stopPropagation());
        els.modal.querySelector('#modalSidebar').addEventListener('click', (e) => e.stopPropagation());

        init();
        lucide.createIcons();

    </script>
